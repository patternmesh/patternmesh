name: Bug report
description: Report a reproducible defect in patternmesh
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include a minimal reproduction.
  - type: input
    id: package
    attributes:
      label: Affected package
      placeholder: "@patternmeshjs/core"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.9.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, code, and data needed to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
