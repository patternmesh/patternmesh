name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Start DynamoDB Local
        run: docker compose up -d dynamodb-local

      - name: Export DynamoDB endpoint
        run: echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> "$GITHUB_ENV"

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/8000) >/dev/null 2>&1; then
              if curl -s -o /dev/null -w "%{http_code}" --max-time 2 http://localhost:8000 | grep -qE '^[1-5][0-9]{2}$'; then
                echo "DynamoDB Local is accepting HTTP after ${i} attempts"
                exit 0
              fi
            fi
            sleep 2
          done
          echo "DynamoDB Local did not become ready in time"
          docker compose logs dynamodb-local || true
          exit 1

      - name: Build
        run: pnpm build

      - name: Generate API docs
        run: pnpm docs:api

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: publint
        run: pnpm publint

      - name: Are the Types Wrong
        run: pnpm attw

      - name: Smoke test tarballs
        run: pnpm smoke:pack

      - uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          title: "Release packages"
          commit: "Release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN: publishing uses npm Trusted Publishing via OIDC.
          # Configure the trusted publisher for the @patternmesh org on npmjs.com
          # pointing at this repo + this workflow filename. The `id-token: write`
          # permission above is what lets npm exchange a short-lived token
          # at publish time and attach provenance attestations.
