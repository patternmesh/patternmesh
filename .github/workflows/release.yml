name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      node-version: "20"
      turbo-cache-key-suffix: "release"
      coverage-artifact-name: "coverage-lcov-release"

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          title: "Release packages"
          commit: "Release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Provenance attestations still come from GitHub OIDC (`id-token: write`
          # above) even though auth is done with NPM_TOKEN.
