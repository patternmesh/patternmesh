name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Start DynamoDB Local
        run: docker compose up -d dynamodb-local

      - name: Export DynamoDB endpoint
        run: echo "DYNAMODB_ENDPOINT=http://localhost:8000" >> "$GITHUB_ENV"

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/shell/ >/dev/null 2>&1 || curl -sSf http://localhost:8000 >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "DynamoDB Local did not become ready in time"
          exit 1

      - name: Generate API docs
        run: pnpm docs:api

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: publint
        run: pnpm publint

      - name: Are the Types Wrong
        run: pnpm attw

      - name: Smoke test tarballs
        run: pnpm smoke:pack

      - uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          title: "Release packages"
          commit: "Release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
